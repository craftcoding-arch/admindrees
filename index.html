<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
        body{background:#f5efe8;padding:20px;}
        .container{max-width:1200px;margin:0 auto;}
        .admin-panel{background:#fff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08);margin-bottom:20px;}
        .form-group{margin-bottom:12px;}
        label{display:block;font-weight:700;margin-bottom:4px;}
        input,select,textarea{width:100%;padding:10px;border:1px solid #dfcfc9;}
        .row{display:flex;gap:12px;flex-wrap:wrap;}
        .row .col{flex:1 1 240px;}
        .btn{background:#c44536;color:#fff;border:none;padding:10px 16px;cursor:pointer;font-weight:700;}
        .btn-danger{background:#a12a2a;}
        .preview{width:100%;height:220px;object-fit:contain;background:#f7edea;border:1px dashed #d4c3bd;}
        .product-list-admin{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
        .admin-item{background:#fef4f1;padding:10px;display:flex;justify-content:space-between;align-items:center;}
        .pill{padding:3px 8px;background:#f0e1dc;color:#c44536;font-weight:700;display:inline-block;}
        .message{margin:10px 0;}
        .success-msg{background:#4caf50;color:#fff;padding:8px;text-align:center;}
        .error-msg{background:#f44336;color:#fff;padding:8px;text-align:center;}
    </style>
</head>
<body>
<div class="container">
    <div class="admin-panel">
        <h2>➕ إضافة منتج جديد</h2>
        <div id="message" class="message"></div>
        <form id="productForm">
            <div class="row">
                <div class="col">
                    <label>📷 صورة من الأمام</label>
                    <input type="file" id="productImageFile" accept="image/*">
                    <img id="imagePreviewFront" class="preview" src="https://via.placeholder.com/300?text=صورة+أمام" alt="">
                </div>
                <div class="col">
                    <label>📷 صورة من الخلف</label>
                    <input type="file" id="productBackImageFile" accept="image/*">
                    <img id="imagePreviewBack" class="preview" src="https://via.placeholder.com/300?text=صورة+خلف" alt="">
                </div>
            </div>
            <div class="form-group">
                <label>🏷️ القسم</label>
                <select id="productCategory">
                    <option value="فستان سهرة">فستان سهرة</option>
                    <option value="فستان زفاف">فستان زفاف</option>
                    <option value="بدلة عرسان">بدلة عرسان</option>
                    <option value="طقم تقليدي">طقم تقليدي</option>
                </select>
            </div>
            <div class="row">
                <div class="col">
                    <label>📏 القياس</label>
                    <select id="productSize">
                        <option value="XS">XS</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                        <option value="XXL">XXL</option>
                    </select>
                </div>
                <div class="col">
                    <label>💰 السعر (دولار)</label>
                    <input type="number" id="productPrice" placeholder="100" required>
                </div>
                <div class="col">
                    <label>🔢 كود المنتج (تلقائي)</label>
                    <input type="text" id="productCode" readonly>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label>💵 سعر الأجرة (دولار)</label>
                    <input type="number" id="productRent" placeholder="50">
                </div>
                <div class="col" style="flex:2 1 400px;">
                    <label>📝 الوصف</label>
                    <textarea id="productDesc" rows="3" placeholder="تفاصيل إضافية عن التصميم"></textarea>
                </div>
            </div>
            <div class="form-group">
                <label>🧵 الأقمشة</label>
                <select id="dressFabrics" multiple size="4">
                    <option>ساتان</option><option>شيفون</option><option>تول</option><option>أورغانزا</option>
                    <option>كريب</option><option>مخمل</option><option>دانتيل</option><option>ترتر</option>
                </select>
            </div>
            <div class="form-group">
                <label>🧭 الموديلات</label>
                <select id="dressModels" multiple size="4">
                    <option>إيه لاين</option><option>حورية البحر</option><option>ترامبت</option><option>مستقيم</option>
                    <option>عمودي</option><option>منفوش ملكي</option><option>خصر إمباير</option><option>فيت آند فلير</option>
                    <option>قصة أميرة</option><option>فستان لف</option><option>فستان انسيابي</option><option>هاي لو</option><option>قفطان سهرة</option>
                </select>
            </div>
            <button type="submit" class="btn">إضافة المنتج</button>
        </form>
    </div>

    <div class="admin-panel">
        <h2>📋 قائمة المنتجات</h2>
        <div id="adminProductsList" class="product-list-admin">
            <div class="loading">⏳ جاري تحميل المنتجات...</div>
        </div>
    </div>
</div>

<script>
    const APP_DOMAIN = 'briefproduce-us.backendless.app';
    const BACKENDLESS_APP_ID = '2E6F9C1A-A874-4B86-B85D-D4BE224CA436';
    const BACKENDLESS_API_KEY = 'D9A7EA80-8140-4F9A-8AD6-45A3FF2369A1';
    const TABLE_NAME = 'Drees';

    let selectedFile = null;
    let selectedBackFile = null;
    const productCodeInput = document.getElementById('productCode');
    const productImageFileInput = document.getElementById('productImageFile');
    const productBackImageFileInput = document.getElementById('productBackImageFile');
    const imagePreviewFront = document.getElementById('imagePreviewFront');
    const imagePreviewBack = document.getElementById('imagePreviewBack');

    const multiSelectIds = ['dressFabrics','dressModels'];

    function setPreview(target, src){
        target.src = src || 'https://via.placeholder.com/300';
    }

    function handleFileSelection(input, target, assign){
        const file = input?.files?.[0] || null;
        assign(file);
        setPreview(target,'');
        if(!file) return;
        const reader=new FileReader();
        reader.onload=()=>setPreview(target,reader.result);
        reader.readAsDataURL(file);
    }

    if(productImageFileInput){
        productImageFileInput.addEventListener('change',()=>handleFileSelection(productImageFileInput,imagePreviewFront,f=>selectedFile=f));
    }
    if(productBackImageFileInput){
        productBackImageFileInput.addEventListener('change',()=>handleFileSelection(productBackImageFileInput,imagePreviewBack,f=>selectedBackFile=f));
    }

    function getSelectedValues(id){
        const el=document.getElementById(id);
        if(!el) return [];
        return Array.from(el.selectedOptions).map(o=>o.value);
    }

    function generateCode(){
        const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let r=''; for(let i=0;i<6;i++) r+=chars[Math.floor(Math.random()*chars.length)];
        return r;
    }

    function setNewCode(){
        if(productCodeInput) productCodeInput.value = generateCode();
    }

    async function uploadImage(file){
        const timestamp = Date.now();
        const safeFilename = `${timestamp}-${file.name}`;
        const uploadPath = `admin-uploads/${encodeURIComponent(safeFilename)}`;
        const endpoint = `https://${APP_DOMAIN}/api/files/${uploadPath}?overwrite=true`;
        const formData = new FormData();
        formData.append('upload', file);
        const response = await fetch(endpoint,{
            method:'POST',
            headers:{
                'application-id': BACKENDLESS_APP_ID,
                'secret-key': BACKENDLESS_API_KEY
            },
            body: formData
        });
        if(!response.ok) throw new Error('فشل في رفع الصورة');
        const payload = await response.json();
        if(!payload.fileURL) throw new Error('لم يتم استرجاع رابط الصورة بعد الرفع');
        return payload.fileURL;
    }

    let products=[];

    function showMessage(text,isError=false){
        const div=document.getElementById('message');
        div.innerHTML = `<div class="${isError?'error-msg':'success-msg'}">${text}</div>`;
        setTimeout(()=>div.innerHTML='',3000);
    }

    async function fetchProducts(){
        try{
            const res = await fetch(`https://${APP_DOMAIN}/api/data/${TABLE_NAME}`,{
                headers:{
                    'Content-Type':'application/json',
                    'application-id': BACKENDLESS_APP_ID,
                    'secret-key': BACKENDLESS_API_KEY
                }
            });
            if(!res.ok) throw new Error('فشل في جلب البيانات');
            products = await res.json();
            renderAdminList();
        }catch(err){
            console.error(err);
            document.getElementById('adminProductsList').innerHTML = `<div class="empty-msg">خطأ في الاتصال بقاعدة البيانات</div>`;
        }
    }

    async function addProduct(data){
        try{
            const res = await fetch(`https://${APP_DOMAIN}/api/data/${TABLE_NAME}`,{
                method:'POST',
                headers:{
                    'Content-Type':'application/json',
                    'application-id': BACKENDLESS_APP_ID,
                    'secret-key': BACKENDLESS_API_KEY
                },
                body: JSON.stringify(data)
            });
            if(!res.ok) throw new Error('فشل في إضافة المنتج');
            await res.json();
            showMessage('✅ تم إضافة المنتج');
            fetchProducts();
        }catch(err){
            console.error(err);
            showMessage('❌ '+err.message,true);
        }
    }

    async function deleteProduct(id){
        if(!confirm('هل أنت متأكد من الحذف؟')) return;
        try{
            const res = await fetch(`https://${APP_DOMAIN}/api/data/${TABLE_NAME}/${id}`,{
                method:'DELETE',
                headers:{
                    'Content-Type':'application/json',
                    'application-id': BACKENDLESS_APP_ID,
                    'secret-key': BACKENDLESS_API_KEY
                }
            });
            if(!res.ok) throw new Error('فشل في الحذف');
            showMessage('🗑️ تم الحذف');
            fetchProducts();
        }catch(err){
            showMessage('❌ '+err.message,true);
        }
    }

    function renderAdminList(){
        const adminContainer=document.getElementById('adminProductsList');
        if(!products || products.length===0){
            adminContainer.innerHTML='<div class="empty-msg">لا توجد منتجات</div>';
            return;
        }
        adminContainer.innerHTML = products.map(p=>`
            <div class="admin-item">
                <div style="display:flex;gap:10px;align-items:center;">
                    <img src="${p.imageFront || p.image || 'https://via.placeholder.com/55'}" width="55" height="55" style="object-fit:cover;">
                    <div>
                        <div class="pill">${p.category || 'غير مصنف'}</div><br>
                        <small>الكود: ${p.code || '-'}</small><br>
                        <small>${p.price ? p.price+' دولار' : ''}</small>
                    </div>
                </div>
                <button class="btn btn-danger" data-id="${p.objectId}">حذف</button>
            </div>
        `).join('');

        adminContainer.querySelectorAll('[data-id]').forEach(btn=>{
            btn.addEventListener('click',e=>{
                e.stopPropagation();
                deleteProduct(btn.getAttribute('data-id'));
            });
        });
    }

    function setupForm(){
        const form=document.getElementById('productForm');
        form.addEventListener('submit', async (e)=>{
            e.preventDefault();
            if(!selectedFile || !selectedBackFile){
                showMessage('⚠️ الرجاء اختيار صورتي الأمام والخلف',true);
                return;
            }
            const category=document.getElementById('productCategory').value;
            const price=document.getElementById('productPrice').value.trim();
            const rent=document.getElementById('productRent').value.trim();
            const size=document.getElementById('productSize').value;
            const desc=document.getElementById('productDesc').value.trim();
            const code=productCodeInput?.value.trim() || '';
            const fabricsList=getSelectedValues('dressFabrics').join(', ');
            const modelsList=getSelectedValues('dressModels').join(', ');

            if(!price){ showMessage('⚠️ الرجاء إدخال السعر',true); return; }

            try{
                const frontURL = await uploadImage(selectedFile);
                const backURL = await uploadImage(selectedBackFile);

                await addProduct({
                    image: frontURL,
                    imageFront: frontURL,
                    imageBack: backURL,
                    category,
                    price: Number(price),
                    rent: rent ? Number(rent) : null,
                    size,
                    description: desc,
                    code: code || generateCode(),
                    fabricsList,
                    modelsList
                });

                form.reset();
                selectedFile=null; selectedBackFile=null;
                setPreview(imagePreviewFront,'https://via.placeholder.com/300?text=صورة+أمام');
                setPreview(imagePreviewBack,'https://via.placeholder.com/300?text=صورة+خلف');
                setNewCode();
                multiSelectIds.forEach(id=>{
                    const el=document.getElementById(id);
                    if(el) el.selectedIndex=-1;
                });

            }catch(err){
                showMessage('❌ '+err.message,true);
            }
        });
    }

    setupForm();
    setNewCode();
    fetchProducts();
</script>
</body>
</html>
